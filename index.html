<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestione Pacchi Postali</title>
    <style>
        :root { --primary: #cc0000; --dark: #333; --accent: #fff8e1; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fefefe; 
            padding: 20px; 
            background-image: url('https://www.transparenttextures.com/patterns/postcard.png');
            color: var(--dark);
        }

        h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        /* Login */
        #loginPage { display: flex; justify-content: center; align-items: center; height: 80vh; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; border: 1px solid #ddd; }
        .login-box input { width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; }

        /* Form Inserimento */
        .form-group { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 12px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        input, select, button { padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        
        button { background-color: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #990000; transform: translateY(-1px); }

        /* Counter e Stato */
        .status-bar {
            background: var(--dark);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-bar strong { color: #ffeb3b; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .tabs button { background-color: #ddd; color: #555; border: none; padding: 8px 15px; }
        .tabs button.active { background-color: var(--primary); color: white; }

        /* Lista Pacchi */
        .pacco { 
            background: white; 
            border-left: 5px solid var(--primary); 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-radius: 8px; 
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .pacco.ritirato { border-left-color: #4caf50; opacity: 0.7; background: #e8f5e9; }

        .tag-grandezza {
            display: inline-block;
            background-color: yellow;
            color: red;
            border: 2px solid red;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 17px;
            margin-right: 10px;
        }

        /* Sezione Ritirati */
        .sezione-ritirati { margin-top: 40px; border-top: 2px dotted #aaa; padding-top: 20px; }
        #ritiratiContainer { overflow: hidden; transition: max-height 0.3s ease; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-box">
        <h2 style="color:var(--primary)">Accesso Gestionale</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()" style="width:100%">ENTRA</button>
    </div>
</div>

<div id="mainPage" style="display:none;">
    <h1>Gestione Pacchi Postali</h1>
    
    <div style="text-align:right; margin-bottom:10px;">
        <button onclick="logout()" style="background:#555; padding:8px 15px;">Logout</button>
    </div>

    <div class="form-group">
        <input type="text" id="codiceTracciabilita" placeholder="Codice Tracciabilità">
        <input type="text" id="codiceRiconoscimento" placeholder="Codice Riconoscimento (opz.)">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="cognome" placeholder="Cognome">
        <select id="corriereSelect"></select>
        <select id="grandezzaSelect">
            <option value="">Grandezza</option>
            <option value="P">P - Piccolo</option>
            <option value="M">M - Medio</option>
            <option value="G">G - Grande</option>
        </select>
        <button onclick="aggiungiPacco()">AGGIUNGI</button>
    </div>

    <div class="status-bar" id="counter">
        </div>

    <input type="text" id="search" style="width:100%; box-sizing:border-box; padding:12px; margin-bottom:20px;" placeholder="Cerca per cognome, codice o tracciabilità..." oninput="aggiornaVista()">

    <div class="tabs" id="tabs"></div>
    <div id="contenitori"></div>

    <div class="sezione-ritirati">
        <h2 id="toggleRitirati" style="cursor:pointer" onclick="toggleRitirati()">Pacchi Ritirati ▼</h2>
        <button onclick="cancellaRitirati()" style="background:#999; font-size:12px; margin-bottom:10px;">Cancella pacchi ritirati</button>
        <div id="ritiratiContainer"></div>
    </div>
</div>

<script>
let pacchi = JSON.parse(localStorage.getItem('pacchi')) || [];
let corrieri = JSON.parse(localStorage.getItem('corrieri')) || ["Poste Italiane", "SDA", "BRT", "GLS", "Amazon"];
let tabAttiva = "Tutti";
let ritiratiAperti = true;

function salva() { localStorage.setItem('pacchi', JSON.stringify(pacchi)); }

function login() {
    const e = document.getElementById('loginEmail').value;
    const p = document.getElementById('loginPassword').value;
    if(e === 'centroposte1@gmail.com' && p === '2025754785478') {
        localStorage.setItem('loggedIn', 'true');
        mostraMain();
    } else { alert("Credenziali errate"); }
}

function logout() { localStorage.removeItem('loggedIn'); location.reload(); }

function mostraMain() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    aggiornaVista();
}

if(localStorage.getItem('loggedIn') === 'true') mostraMain();

function aggiungiPacco() {
    const ct = document.getElementById('codiceTracciabilita').value.trim();
    const cr = document.getElementById('codiceRiconoscimento').value.trim();
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();
    const corriere = document.getElementById('corriereSelect').value;
    const grandezza = document.getElementById('grandezzaSelect').value;

    if(!cognome || !corriere) { alert("Cognome e Corriere sono obbligatori"); return; }

    // TUA LOGICA ORIGINALE PER IL NUMERO PROGRESSIVO
    const numeri = pacchi
        .filter(p => p.corriere === corriere && !p.ritirato)
        .map(p => parseInt(p.riconoscimento))
        .filter(n => !isNaN(n));

    const riconoscimento = cr || (numeri.length ? Math.max(...numeri) + 1 : 1);

    pacchi.push({
        id: Date.now(),
        codiceTracciabilita: ct || '-',
        riconoscimento: riconoscimento,
        nome: nome,
        cognome: cognome,
        corriere: corriere,
        grandezza: grandezza,
        ritirato: false,
        dataRitiro: null
    });

    salva();
    // Reset campi
    ['codiceTracciabilita','codiceRiconoscimento','nome','cognome'].forEach(id => document.getElementById(id).value = '');
    aggiornaVista();
}

function aggiornaVista() {
    const search = document.getElementById('search').value.toLowerCase();
    const cont = document.getElementById('contenitori');
    const rCont = document.getElementById('ritiratiContainer');
    const tabs = document.getElementById('tabs');
    const selC = document.getElementById('corriereSelect');

    // Popola Select e Tabs
    selC.innerHTML = '<option value="">Seleziona Corriere</option>';
    corrieri.forEach(c => selC.innerHTML += `<option value="${c}">${c}</option>`);

    tabs.innerHTML = `<button onclick="setTab('Tutti')" class="${tabAttiva==='Tutti'?'active':''}">Tutti</button>`;
    corrieri.forEach(c => {
        tabs.innerHTML += `<button onclick="setTab('${c}')" class="${tabAttiva===c?'active':''}">${c}</button>`;
    });

    // FILTRO LOGICA ORIGINALE (Ricerca + Tab)
    const filtrati = pacchi.filter(p => {
        const matchSearch = p.cognome.toLowerCase().includes(search) || 
                            p.codiceTracciabilita.toLowerCase().includes(search) || 
                            String(p.riconoscimento).includes(search);
        const matchTab = (tabAttiva === "Tutti" || p.corriere === tabAttiva);
        return matchSearch && matchTab;
    });

    const giacenza = filtrati.filter(p => !p.ritirato);
    const ritirati = filtrati.filter(p => p.ritirato);

    // Update Counter (Grafica Nuova + Richiesta specifica)
    const ultimoPacco = pacchi.length > 0 ? pacchi[pacchi.length - 1].riconoscimento : "---";
    document.getElementById('counter').innerHTML = `
        Pacchi in giacenza: <strong>${giacenza.length}</strong> 
        <span style="margin:0 15px">|</span> 
        Numero ultimo pacco registrato: <strong>#${ultimoPacco}</strong>
    `;

    // Render Liste
    cont.innerHTML = giacenza.map(p => creaCard(p)).join('');
    rCont.innerHTML = ritirati.map(p => creaCard(p)).join('');
}

function creaCard(p) {
    return `
        <div class="pacco ${p.ritirato ? 'ritirato' : ''}">
            <div>
                <span class="tag-grandezza">${p.grandezza || ''}</span>
                <strong>#${p.riconoscimento}</strong> - ${p.codiceTracciabilita} - ${p.nome} ${p.cognome} <em>(${p.corriere})</em>
            </div>
            <input type="checkbox" ${p.ritirato?'checked':''} onclick="toggleRitirato(${p.id})">
        </div>
    `;
}

function setTab(t) { tabAttiva = t; aggiornaVista(); }

function toggleRitirato(id) {
    const p = pacchi.find(x => x.id === id);
    p.ritirato = !p.ritirato;
    p.dataRitiro = p.ritirato ? new Date().toLocaleString() : null;
    salva();
    aggiornaVista();
}

function toggleRitirati() {
    ritiratiAperti = !ritiratiAperti;
    const c = document.getElementById('ritiratiContainer');
    c.style.maxHeight = ritiratiAperti ? "2000px" : "0px";
    document.getElementById('toggleRitirati').innerText = ritiratiAperti ? "Pacchi Ritirati ▼" : "Pacchi Ritirati ▶";
}

function cancellaRitirati() {
    if(confirm("Eliminare i pacchi ritirati?")) {
        pacchi = pacchi.filter(p => !p.ritirato);
        salva();
        aggiornaVista();
    }
}
</script>
</body>
</html>
