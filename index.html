<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>📦 Gestione Pacchi - Poste Private</title>
    <style>
        :root { 
            --primary: #003399; /* BLU */
            --accent: #ffcc00;  /* GIALLO */
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }

        /* --- LOGIN --- */
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--primary); }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; border-top: 8px solid var(--accent); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* --- HEADER --- */
        .app-header { 
            display: flex; align-items: center; justify-content: center; gap: 15px; 
            background: var(--primary); color: var(--accent); padding: 20px; border-radius: 15px; margin-bottom: 20px;
        }

        /* --- FORM --- */
        .form-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; 
            background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        button { background: var(--primary); color: var(--accent); font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #002266; }

        /* --- TABS --- */
        .status-bar { background: var(--primary); color: var(--accent); padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .tabs button { background: #ddd; color: #333; border-radius: 20px; border: none; padding: 8px 15px; }
        .tabs button.active { background: var(--accent); color: var(--primary); border: 2px solid var(--primary); }

        /* --- PACCO (EFFETTO MOVIMENTO) --- */
        .pacco { 
            background: white; border-left: 6px solid var(--primary); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 10px; 
            margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease; /* Transizione per il movimento */
        }
        .pacco:hover { 
            transform: translateY(-5px) scale(1.02); /* Si alza e si ingrandisce */
            box-shadow: 0 8px 15px rgba(0,51,153,0.2);
            background: #fffef0;
        }
        .pacco.ritirato { border-left-color: #28a745; opacity: 0.7; }

        /* --- MODALE --- */
        #customModal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        #signature-pad { border: 2px dashed #ccc; background: #f9f9f9; border-radius: 8px; margin-top: 10px; touch-action: none; }
    </style>
</head>
<body>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle">Ritiro Pacco</h3>
        <p id="modalText"></p>
        <input type="text" id="modalInput" style="width:100%; box-sizing:border-box; margin-top:10px; display:none;">
        <div id="firmaArea" style="display:none; margin-top:10px;">
            <canvas id="signature-pad" width="350" height="150"></canvas>
            <button onclick="clearCanvas()" style="font-size:10px; background:#666; margin-top:5px;">Cancella Firma</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; background:#ccc; color:black;">Annulla</button>
            <button id="modalConfirmBtn" style="flex:1">Conferma</button>
        </div>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://i.postimg.cc/G3y2rJB3/279906960-144981891431476-7263855552537817887-n-high.webp" width="120">
        <h2>Centro Post@ Anaclerio</h2>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; margin-bottom:20px; box-sizing:border-box;">
        <button onclick="login()" style="width:100%">ACCEDI</button>
    </div>
</div>

<div id="mainPage" style="display:none;" class="container">
    <div class="app-header">
        <img src="https://i.postimg.cc/G3y2rJB3/279906960-144981891431476-7263855552537817887-n-high.webp" height="60">
        <h1>Centro Post@ Anaclerio</h1>
    </div>

    <div class="form-group">
        <input type="text" id="codiceTracciabilita" placeholder="Tracking TRK">
        <input type="text" id="codiceRiconoscimento" placeholder="ID Pacco">
        <input type="text" id="intestatario" placeholder="Nome e Cognome" list="nomiSalvati">
        <datalist id="nomiSalvati"></datalist>
        
        <select id="corriereSelect"></select>
        <select id="scaffaleSelect">
            <option value="">Scaffale</option>
            <script>for(let i=1;i<=12;i++) document.write(`<option value="Scaffale ${i}">Scaffale ${i}</option>`);</script>
        </select>
        <select id="grandezzaSelect">
            <option value="P">Taglia P</option><option value="M">Taglia M</option><option value="G">Taglia G</option>
        </select>
        <button onclick="aggiungiPacco()">+ AGGIUNGI</button>
    </div>

    <div class="status-bar" id="counter"></div>
    <input type="text" id="search" style="width:100%; margin-bottom:20px; padding:12px; border-radius:25px; border:1px solid #ccc; box-sizing:border-box;" placeholder="🔍 Cerca cliente o numero pacco..." oninput="aggiornaVista()">
    
    <div class="tabs" id="tabs"></div>
    <div id="contenitori"></div>

    <div style="margin-top:30px;">
        <h3 onclick="toggleRitirati()" style="cursor:pointer; color:var(--primary)">▼ Archivio Ritirati</h3>
        <div id="sezRitirati" style="display:none;">
            <button id="btnSvuota" onclick="cancellaRitirati()" style="background:#cc0000; color:white; font-size:11px; margin-bottom:10px;">SVUOTA RITIRATI (CORRIERE ATTUALE)</button>
            <div id="ritiratiContainer"></div>
        </div>
    </div>
</div>

<script>
let pacchi = JSON.parse(localStorage.getItem('pacchi')) || [];
// --- I TUOI CORRIERI ORIGINALI ---
let corrieri = ["Punto Poste", "SDA", "BRT", "GLS", "Amazon"];
let tabAttiva = 'Tutti';

// Firma
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
let drawing = false;
function getPos(e){ const r = canvas.getBoundingClientRect(); return {x:(e.clientX||e.touches[0].clientX)-r.left, y:(e.clientY||e.touches[0].clientY)-r.top}; }
canvas.addEventListener('mousedown', (e)=>{ drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mousemove', (e)=>{ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
window.addEventListener('mouseup', ()=>drawing=false);
canvas.addEventListener('touchstart', (e)=>{ drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('touchmove', (e)=>{ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

function salva(){ 
    localStorage.setItem('pacchi', JSON.stringify(pacchi)); 
    aggiornaSuggerimenti();
}

function login(){
    if(document.getElementById('loginEmail').value==='centroposte1@gmail.com' && document.getElementById('loginPassword').value==='2025754785478'){
        localStorage.setItem('loggedIn','true');
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainPage').style.display='block';
        aggiornaVista();
    } else alert("Dati errati");
}

function aggiornaSuggerimenti() {
    const dl = document.getElementById('nomiSalvati');
    const nomi = [...new Set(pacchi.map(p => p.intestatario))];
    dl.innerHTML = nomi.map(n => `<option value="${n}">`).join('');
}

function aggiungiPacco(){
    const int = document.getElementById('intestatario').value.trim();
    const corr = document.getElementById('corriereSelect').value;
    const cr = document.getElementById('codiceRiconoscimento').value.trim();
    if(!int || !corr) return alert("Manca Intestatario o Corriere");

    // TUA LOGICA ORIGINALE NUMERAZIONE
    let num = cr || (pacchi.filter(p => p.corriere === corr && !p.ritirato).length + 1);
    if(!cr) {
        const pG = pacchi.filter(p => p.corriere === corr && !p.ritirato);
        num = pG.length > 0 ? parseInt(pG[pG.length-1].riconoscimento) + 1 : 1;
    }

    pacchi.push({
        id: Date.now(),
        codiceTracciabilita: document.getElementById('codiceTracciabilita').value || '-',
        riconoscimento: num,
        intestatario: int,
        corriere: corr,
        scaffale: document.getElementById('scaffaleSelect').value,
        grandezza: document.getElementById('grandezzaSelect').value,
        ritirato: false, dataRitiro: null, ritiratoDa: '', firma: null
    });
    salva(); aggiornaVista();
    ['codiceTracciabilita','codiceRiconoscimento','intestatario'].forEach(i => document.getElementById(i).value='');
}

function aggiornaVista(){
    const sel = document.getElementById('corriereSelect');
    sel.innerHTML = '<option value="">Scegli Corriere</option>' + corrieri.map(c => `<option value="${c}">${c}</option>`).join('');
    
    const tBox = document.getElementById('tabs');
    tBox.innerHTML = `<button onclick="setTab('Tutti')" class="${tabAttiva==='Tutti'?'active':''}">Tutti</button>` + 
        corrieri.map(c => `<button onclick="setTab('${c}')" class="${tabAttiva===c?'active':''}">${c}</button>`).join('');

    const query = document.getElementById('search').value.toLowerCase();
    const filt = p => (tabAttiva==='Tutti' || p.corriere===tabAttiva) && (p.intestatario.toLowerCase().includes(query) || String(p.riconoscimento).includes(query));
    
    const giacenza = pacchi.filter(p => !p.ritirato && filt(p));
    const ritirati = pacchi.filter(p => p.ritirato && filt(p)).reverse();

    document.getElementById('counter').innerText = `📦 Giacenza ${tabAttiva}: ${giacenza.length} pacchi`;
    document.getElementById('btnSvuota').innerText = `SVUOTA RITIRATI (${tabAttiva})`;

    document.getElementById('contenitori').innerHTML = giacenza.map(p => genHtml(p)).join('');
    document.getElementById('ritiratiContainer').innerHTML = ritirati.map(p => genHtml(p)).join('');
    aggiornaSuggerimenti();
}

function genHtml(p) {
    return `
        <div class="pacco ${p.ritirato?'ritirato':''}">
            <div style="flex:1">
                <strong><span style="background:var(--accent);padding:2px 5px;border-radius:4px;">${p.grandezza}</span> #${p.riconoscimento} - ${p.intestatario.toUpperCase()}</strong><br>
                <small>${p.corriere} | ${p.scaffale} | TRK: ${p.codiceTracciabilita}</small>
                ${p.ritirato ? `<div style="color:green;font-size:12px;margin-top:5px;">✓ Ritirato da: ${p.ritiratoDa} il ${p.dataRitiro}</div>` : ''}
            </div>
            <input type="checkbox" style="transform:scale(1.5)" ${p.ritirato?'checked':''} onchange="handleT(${p.id})">
        </div>
    `;
}

function handleT(id){
    const p = pacchi.find(x=>x.id===id);
    if(!p.ritirato){
        document.getElementById('customModal').style.display='flex';
        document.getElementById('modalText').innerText = `Consegna pacco a ${p.intestatario}`;
        document.getElementById('modalInput').style.display='block';
        document.getElementById('modalInput').value = p.intestatario;
        document.getElementById('firmaArea').style.display='block';
        clearCanvas();
        document.getElementById('modalConfirmBtn').onclick = () => {
            p.ritirato = true;
            p.ritiratoDa = document.getElementById('modalInput').value;
            p.dataRitiro = new Date().toLocaleString();
            p.firma = canvas.toDataURL();
            salva(); closeModal();
        };
    } else {
        if(confirm("Ripristinare pacco?")){ p.ritirato=false; salva(); aggiornaVista(); }
    }
}

function closeModal(){ document.getElementById('customModal').style.display='none'; aggiornaVista(); }

function setTab(t){ tabAttiva = t; aggiornaVista(); }

// CANCELLAZIONE SELETTIVA RICHIESTA
function cancellaRitirati(){
    const msg = tabAttiva === 'Tutti' ? "Svuotare TUTTO l'archivio ritirati?" : `Svuotare solo i ritirati di ${tabAttiva}?`;
    if(confirm(msg)){
        if(tabAttiva === 'Tutti') {
            pacchi = pacchi.filter(p => !p.ritirato);
        } else {
            pacchi = pacchi.filter(p => !(p.ritirato && p.corriere === tabAttiva));
        }
        salva(); aggiornaVista();
    }
}

function toggleRitirati(){
    const s = document.getElementById('sezRitirati');
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

if(localStorage.getItem('loggedIn')==='true'){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
    aggiornaVista();
}
</script>
</body>
</html>
