<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>📦 Gestione Pacchi - Poste Private</title>
    <style>
        :root { 
            --primary: #003399; /* Blu Poste */
            --accent: #ffcc00;  /* Giallo Poste */
            --bg: #f0f2f5; 
            --text: #1a1a1a; 
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg); 
            padding: 0; margin: 0; color: var(--text); 
        }

        /* --- LOGIN --- */
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--primary); }
        .login-box { 
            background: var(--white); padding: 40px; border-radius: 15px; text-align: center; width: 350px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 8px solid var(--accent);
        }

        /* --- HEADER --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .app-header { 
            display: flex; align-items: center; justify-content: center; gap: 15px; 
            margin-bottom: 25px; background: var(--primary); padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: var(--accent);
        }
        .app-header img { height: 60px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }

        /* --- FORM --- */
        .form-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; 
            background: var(--white); padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 20px; 
        }
        input, select, button { padding: 12px; font-size: 14px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(0,51,153,0.2); }
        
        button { 
            background-color: var(--primary); color: var(--accent); border: none; 
            cursor: pointer; font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background-color: #002266; transform: scale(1.02); }

        /* --- TABS --- */
        .status-bar { background: var(--primary); color: var(--accent); padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .tabs button { background-color: #ddd; color: #333; border-radius: 20px; padding: 8px 16px; font-size: 0.85em; }
        .tabs button.active { background-color: var(--accent); color: var(--primary); border: 2px solid var(--primary); }

        /* --- PACCO CARD (ANIMATA) --- */
        .pacco { 
            background: var(--white); border-left: 8px solid var(--primary); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 10px; 
            margin-bottom: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* Effetto movimento al passaggio */
        .pacco:hover { 
            transform: translateX(10px) scale(1.02); 
            box-shadow: 0 10px 20px rgba(0,51,153,0.15);
            background-color: #fffdf2;
        }
        .pacco.ritirato { border-left-color: #28a745; opacity: 0.8; }
        
        .tag-grandezza { background: var(--accent); color: var(--primary); padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-right: 10px; }

        /* --- MODALE --- */
        #customModal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
        }
        .modal-content { 
            background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center;
            border: 4px solid var(--primary);
        }
        #signature-pad { border: 2px dashed var(--primary); background: #f9f9f9; border-radius: 8px; margin-top: 10px; touch-action: none; }

        .info-ritiro { color: #28a745; font-size: 0.85em; margin-top: 8px; font-weight: bold; border-top: 1px solid #eee; padding-top: 5px; }
        .pacco-checkbox { transform: scale(1.7); cursor: pointer; accent-color: var(--primary); }
    </style>
</head>
<body>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--primary)">Ritiro Pacco</h3>
        <p id="modalText"></p>
        <input type="text" id="modalInput" style="width:100%; box-sizing:border-box; margin-top:10px; display:none;" placeholder="Cognome chi ritira">
        
        <div id="firmaBox" style="display:none; margin-top:10px;">
            <label style="font-size:12px; font-weight:bold;">Firma per ricevuta:</label>
            <canvas id="signature-pad" width="350" height="150"></canvas>
            <button onclick="clearCanvas()" style="font-size:10px; background:#666; padding:5px; margin-top:5px;">Cancella</button>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; background:#ccc; color:#333;">Annulla</button>
            <button id="modalConfirmBtn" style="flex:1">Conferma</button>
        </div>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://i.postimg.cc/G3y2rJB3/279906960-144981891431476-7263855552537817887-n-high.webp" width="120">
        <h2 style="color:var(--primary)">Area Riservata</h2>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; margin-bottom:20px; box-sizing:border-box;">
        <button onclick="login()" style="width:100%">ACCEDI</button>
    </div>
</div>

<div id="mainPage" style="display:none;" class="container">
    <div class="app-header">
        <img src="https://i.postimg.cc/G3y2rJB3/279906960-144981891431476-7263855552537817887-n-high.webp">
        <h1>Centro Post@ Anaclerio</h1>
    </div>

    <div class="form-group">
        <input type="text" id="codiceTracciabilita" placeholder="Tracking TRK">
        <input type="text" id="codiceRiconoscimento" placeholder="Numero Pacco">
        <input type="text" id="intestatario" placeholder="Nome e Cognome Intestatario" list="suggerimentiNomi">
        <datalist id="suggerimentiNomi"></datalist>
        
        <select id="corriereSelect"></select>
        <select id="scaffaleSelect">
            <option value="">Scaffale</option>
            <script>for(let i=1;i<=12;i++) document.write(`<option value="Scaffale ${i}">Scaffale ${i}</option>`);</script>
        </select>
        <select id="grandezzaSelect">
            <option value="P">Taglia P</option><option value="M">Taglia M</option><option value="G">Taglia G</option>
        </select>
        <button onclick="aggiungiPacco()">+ AGGIUNGI</button>
    </div>

    <div class="status-bar" id="counter">Caricamento...</div>
    <input type="text" id="search" style="width:100%; margin-bottom:20px; box-sizing:border-box; border-radius:30px; padding:15px;" placeholder="🔍 Cerca cliente o numero..." oninput="aggiornaVista()">
    
    <div class="tabs" id="tabs"></div>
    <div id="contenitori"></div>

    <div style="margin-top:30px; background:white; padding:15px; border-radius:10px;">
        <h3 onclick="document.getElementById('sezR').style.display=document.getElementById('sezR').style.display==='none'?'block':'none'" style="cursor:pointer; color:var(--primary)">▼ Archivio Ritirati</h3>
        <div id="sezR" style="display:none;">
            <button id="btnSvuotaDinamico" onclick="cancellaRitirati()" style="font-size:11px; margin-bottom:10px; background:#cc0000; color:white;">SVUOTA RITIRATI</button>
            <div id="ritiratiContainer"></div>
        </div>
    </div>
</div>

<script>
let pacchi = JSON.parse(localStorage.getItem('pacchi')) || [];
let corrieri = ["Punto Poste", "SDA", "BRT", "GLS", "Amazon"];
let tabAttiva = 'Tutti';

// Firma
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
let drawing = false;
function getPos(e){ const r = canvas.getBoundingClientRect(); return {x:(e.clientX||e.touches[0].clientX)-r.left, y:(e.clientY||e.touches[0].clientY)-r.top}; }
canvas.addEventListener('mousedown', (e)=>{ drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mousemove', (e)=>{ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
window.addEventListener('mouseup', ()=>drawing=false);
canvas.addEventListener('touchstart', (e)=>{ drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('touchmove', (e)=>{ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

function salva(){ 
    localStorage.setItem('pacchi', JSON.stringify(pacchi)); 
    aggiornaSuggerimenti();
}

function login(){
    if(document.getElementById('loginEmail').value==='centroposte1@gmail.com' && document.getElementById('loginPassword').value==='2025754785478'){
        localStorage.setItem('loggedIn','true');
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainPage').style.display='block';
        aggiornaVista();
    } else alert("Dati errati");
}

function aggiornaSuggerimenti() {
    const list = document.getElementById('suggerimentiNomi');
    const nomiUnici = [...new Set(pacchi.map(p => p.intestatario))];
    list.innerHTML = nomiUnici.map(n => `<option value="${n}">`).join('');
}

function aggiungiPacco(){
    const int = document.getElementById('intestatario').value.trim();
    const corr = document.getElementById('corriereSelect').value;
    const cr = document.getElementById('codiceRiconoscimento').value.trim();
    
    if(!int || !corr) return alert("Manca Intestatario o Corriere");

    // Logica numero pacco originale
    let num = cr || (pacchi.filter(p => p.corriere === corr && !p.ritirato).length + 1);
    if(!cr) {
        const pG = pacchi.filter(p => p.corriere === corr && !p.ritirato);
        num = pG.length > 0 ? parseInt(pG[pG.length-1].riconoscimento) + 1 : 1;
    }

    pacchi.push({
        id: Date.now(),
        codiceTracciabilita: document.getElementById('codiceTracciabilita').value || '-',
        riconoscimento: num,
        intestatario: int,
        corriere: corr,
        scaffale: document.getElementById('scaffaleSelect').value,
        grandezza: document.getElementById('grandezzaSelect').value,
        ritirato: false, dataRitiro: null, ritiratoDa: '', firma: null
    });
    salva(); aggiornaVista();
    ['codiceTracciabilita','codiceRiconoscimento','intestatario'].forEach(i => document.getElementById(i).value='');
}

function aggiornaVista(){
    const sel = document.getElementById('corriereSelect');
    sel.innerHTML = '<option value="">Scegli Corriere</option>' + corrieri.map(c => `<option value="${c}">${c}</option>`).join('');
    
    const tBox = document.getElementById('tabs');
    tBox.innerHTML = `<button onclick="setTab('Tutti')" class="${tabAttiva==='Tutti'?'active':''}">Tutti</button>` + 
        corrieri.map(c => `<button onclick="setTab('${c}')" class="${tabAttiva===c?'active':''}">${c}</button>`).join('');

    const search = document.getElementById('search').value.toLowerCase();
    const filt = p => (tabAttiva==='Tutti' || p.corriere===tabAttiva) && (p.intestatario.toLowerCase().includes(search) || String(p.riconoscimento).includes(search));
    
    const giacenza = pacchi.filter(p => !p.ritirato && filt(p));
    const ritirati = pacchi.filter(p => p.ritirato && filt(p)).reverse();

    document.getElementById('counter').innerText = `Giacenza ${tabAttiva}: ${giacenza.length} pacchi`;
    document.getElementById('btnSvuotaDinamico').innerText = `SVUOTA RITIRATI (${tabAttiva})`;

    document.getElementById('contenitori').innerHTML = giacenza.map(p => genHtml(p)).join('');
    document.getElementById('ritiratiContainer').innerHTML = ritirati.map(p => genHtml(p)).join('');
    aggiornaSuggerimenti();
}

function genHtml(p) {
    let fLink = p.firma ? `<span style="color:var(--primary);cursor:pointer;text-decoration:underline;margin-left:10px" onclick="mostraFirma('${p.id}')">VEDI FIRMA</span>` : '';
    return `
        <div class="pacco ${p.ritirato?'ritirato':''}">
            <div style="flex:1">
                <span class="tag-grandezza">${p.grandezza}</span>
                <strong>#${p.riconoscimento} - ${p.intestatario.toUpperCase()}</strong><br>
                <small>${p.corriere} | ${p.scaffale} | TRK: ${p.codiceTracciabilita}</small>
                ${p.ritirato ? `<div class="info-ritiro">✓ Consegnato a: ${p.ritiratoDa} il ${p.dataRitiro} ${fLink}</div>` : ''}
            </div>
            <input type="checkbox" class="pacco-checkbox" ${p.ritirato?'checked':''} onchange="handleT(${p.id})">
        </div>
    `;
}

function handleT(id){
    const p = pacchi.find(x=>x.id===id);
    if(!p.ritirato){
        document.getElementById('customModal').style.display='flex';
        document.getElementById('modalText').innerText = `Consegna pacco a ${p.intestatario}`;
        document.getElementById('modalInput').style.display='block';
        document.getElementById('modalInput').value = p.intestatario;
        document.getElementById('firmaBox').style.display='block';
        clearCanvas();
        document.getElementById('modalConfirmBtn').onclick = () => {
            const ora = new Date();
            p.ritirato = true;
            p.ritiratoDa = document.getElementById('modalInput').value;
            p.dataRitiro = ora.toLocaleString();
            p.firma = canvas.toDataURL();
            salva(); closeModal();
        };
    } else {
        if(confirm("Riportare in giacenza?")){ p.ritirato=false; p.firma=null; salva(); aggiornaVista(); }
    }
}

function closeModal(){ document.getElementById('customModal').style.display='none'; aggiornaVista(); }

function mostraFirma(id){
    const p = pacchi.find(x=>x.id==id);
    const w = window.open("","","width=400,height=300");
    w.document.write(`<body style="text-align:center;font-family:sans-serif"><h3>Firma di: ${p.ritiratoDa}</h3><img src="${p.firma}" style="border:2px solid var(--primary);border-radius:10px;"><p>Pacco #${p.riconoscimento}</p></body>`);
}

function setTab(t){ tabAttiva = t; aggiornaVista(); }

// CANCELLAZIONE SELETTIVA
function cancellaRitirati(){
    const msg = tabAttiva === 'Tutti' ? "Cancellare TUTTO l'archivio?" : `Cancellare solo i ritirati di ${tabAttiva}?`;
    if(confirm(msg)){
        if(tabAttiva === 'Tutti') {
            pacchi = pacchi.filter(p => !p.ritirato);
        } else {
            // Rimuove solo i ritirati del corriere attivo
            pacchi = pacchi.filter(p => !(p.ritirato && p.corriere === tabAttiva));
        }
        salva(); aggiornaVista();
    }
}

if(localStorage.getItem('loggedIn')==='true'){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
    aggiornaVista();
}
</script>
</body>
</html>
