<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestione Pacchi Postali Pro</title>
    <style>
        :root { --primary: #cc0000; --secondary: #fefefe; --text: #333; --focus-border: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--secondary); padding: 20px; color: var(--text); }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select, button { padding: 12px; font-size: 15px; border-radius: 8px; border: 2px solid #ddd; outline: none; transition: all 0.2s; }
        input:focus, select:focus { border-color: var(--focus-border); background-color: #f0f7ff; box-shadow: 0 0 10px rgba(0,86,179,0.2); }
        button { background-color: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .status-bar { background: #333; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-size: 1.1em; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .tabs button { background-color: #ddd; color: #555; border: none; cursor: pointer; }
        .tabs button.active { background-color: var(--primary); color: white; }
        .pacco { background: white; border-left: 5px solid var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .pacco.ritirato { border-left-color: #4caf50; opacity: 0.8; background: #f1f8f1; }
        .tag-grandezza { background: #ffeb3b; color: #d32f2f; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-right: 10px; border: 1px solid #fbc02d; }
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-ritirati { cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; margin-top: 20px; }
        .freccia { transition: transform 0.3s; display: inline-block; }
        .freccia.chiuso { transform: rotate(-90deg); }
        #sezioneRitirati { display: block; }
        .info-ritiro { color: #2e7d32; font-size: 0.85em; margin-top: 5px; font-weight: bold; border-top: 1px solid #ddd; padding-top: 5px; }

        /* MODALE PERSONALIZZATO */
        #customModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 { margin-top: 0; color: var(--primary); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; }
        .btn-cancel { background: #666; }
    </style>
</head>
<body>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle">Conferma Ritiro</h3>
        <p id="modalText"></p>
        <input type="text" id="modalInput" style="width:100%; box-sizing:border-box; margin-top:10px; display:none;">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Annulla</button>
            <button id="modalConfirmBtn">Conferma</button>
        </div>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <h2 style="color:var(--primary)">Centro Poste</h2>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; margin-bottom:10px;">
        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; margin-bottom:20px;">
        <button onclick="login()" style="width:100%">ACCEDI</button>
    </div>
</div>

<div id="mainPage" style="display:none;">
    <h1 style="text-align:center">Gestione Pacchi</h1>
    <div class="form-group">
        <input type="text" id="codiceTracciabilita" placeholder="Codice Tracciabilità">
        <input type="text" id="codiceRiconoscimento" placeholder="Numero Pacco (es. 64)">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="cognome" placeholder="Cognome">
        <select id="corriereSelect"></select>
        <select id="scaffaleSelect">
            <option value="">Seleziona Scaffale</option>
            <script>for(let i=1;i<=12;i++) document.write(`<option value="Scaffale ${i}">Scaffale ${i}</option>`);</script>
        </select>
        <select id="grandezzaSelect">
            <option value="P">P</option><option value="M">M</option><option value="G">G</option>
        </select>
        <button onclick="aggiungiPacco()">+ AGGIUNGI PACCO</button>
    </div>

    <div class="status-bar" id="counter"></div>
    <input type="text" id="search" style="width:100%; margin-bottom:20px; box-sizing: border-box;" placeholder="Cerca per cognome, numero o tracking..." oninput="aggiornaVista()">
    <div class="tabs" id="tabs"></div>
    <div id="contenitori"></div>

    <div style="margin-top:40px; border-top:2px dashed #ccc; padding-top:20px;">
        <h3 class="header-ritirati" onclick="toggleSezioneRitirati()">
            <span id="frecciaIcon" class="freccia">▼</span> Pacchi Ritirati
        </h3>
        <div id="sezioneRitirati">
            <button onclick="cancellaRitirati()" style="font-size:12px; background:#666; margin-bottom:10px;">Svuota Cronologia</button>
            <div id="ritiratiContainer"></div>
        </div>
    </div>
</div>

<script>
let pacchi = JSON.parse(localStorage.getItem('pacchi')) || [];
let corrieri = JSON.parse(localStorage.getItem('corrieri')) || ["Punto Poste", "SDA", "BRT", "GLS", "Amazon"];
let tabAttiva = 'Tutti';

function salva(){ localStorage.setItem('pacchi', JSON.stringify(pacchi)); }

function login(){
    if(document.getElementById('loginEmail').value === 'centroposte1@gmail.com' && document.getElementById('loginPassword').value === '2025754785478'){
        localStorage.setItem('loggedIn', 'true');
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainPage').style.display='block';
        aggiornaVista();
    } else { alert("Dati errati"); }
}

function toggleSezioneRitirati() {
    const sezione = document.getElementById('sezioneRitirati');
    const freccia = document.getElementById('frecciaIcon');
    sezione.style.display = (sezione.style.display === "none") ? "block" : "none";
    freccia.classList.toggle('chiuso');
}

// LOGICA MODALE PERSONALIZZATO
let currentPaccoId = null;

function openModal(title, text, showInput, inputValue, onConfirm) {
    document.getElementById('customModal').style.display = 'flex';
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalText').innerText = text;
    const input = document.getElementById('modalInput');
    input.style.display = showInput ? 'block' : 'none';
    input.value = inputValue || '';
    
    document.getElementById('modalConfirmBtn').onclick = () => {
        onConfirm(input.value);
        closeModal();
    };
}

function closeModal() {
    document.getElementById('customModal').style.display = 'none';
    aggiornaVista(); // Re-render per resettare checkbox se annullato
}

function aggiungiPacco(){
    const ct = document.getElementById('codiceTracciabilita').value.trim();
    const cr = document.getElementById('codiceRiconoscimento').value.trim();
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();
    const corriere = document.getElementById('corriereSelect').value;

    if(!cognome || !corriere) { alert("Cognome e Corriere obbligatori"); return; }

    let riconoscimento = cr || (pacchi.filter(p => p.corriere === corriere && !p.ritirato).length + 1);
    if(!cr) {
        const pGiacenza = pacchi.filter(p => p.corriere === corriere && !p.ritirato);
        riconoscimento = pGiacenza.length > 0 ? parseInt(pGiacenza[pGiacenza.length-1].riconoscimento) + 1 : 1;
    }

    pacchi.push({
        id: Date.now(),
        codiceTracciabilita: ct || '-',
        riconoscimento: riconoscimento,
        nome: nome,
        cognome: cognome,
        corriere: corriere,
        scaffale: document.getElementById('scaffaleSelect').value,
        grandezza: document.getElementById('grandezzaSelect').value,
        ritirato: false,
        dataRitiro: null,
        ritiratoDa: ''
    });

    salva();
    aggiornaVista();
    ['codiceTracciabilita','codiceRiconoscimento','nome','cognome'].forEach(id => document.getElementById(id).value = '');
}

function aggiornaVista(){
    const sel = document.getElementById('corriereSelect');
    const oldVal = sel.value;
    sel.innerHTML = '<option value="">Seleziona Corriere</option>';
    corrieri.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    sel.value = oldVal;

    const tabsBox = document.getElementById('tabs');
    tabsBox.innerHTML = `<button onclick="setTab('Tutti')" class="${tabAttiva==='Tutti'?'active':''}">Tutti</button>`;
    corrieri.forEach(c => tabsBox.innerHTML += `<button onclick="setTab('${c}')" class="${tabAttiva===c?'active':''}">${c}</button>`);

    const search = document.getElementById('search').value.toLowerCase();
    
    const inGiacenza = pacchi.filter(p => !p.ritirato && 
        (tabAttiva === 'Tutti' || p.corriere === tabAttiva) &&
        (p.cognome.toLowerCase().includes(search) || String(p.riconoscimento).includes(search) || p.codiceTracciabilita.toLowerCase().includes(search))
    );
    
    const ritirati = pacchi.filter(p => p.ritirato && 
        (tabAttiva === 'Tutti' || p.corriere === tabAttiva) &&
        (p.cognome.toLowerCase().includes(search) || String(p.riconoscimento).includes(search) || p.codiceTracciabilita.toLowerCase().includes(search))
    ).reverse();

    const ultimoGiacenza = pacchi.filter(p => !p.ritirato && (tabAttiva === 'Tutti' || p.corriere === tabAttiva));
    let ultimoNum = ultimoGiacenza.length > 0 ? ultimoGiacenza[ultimoGiacenza.length - 1].riconoscimento : "---";

    document.getElementById('counter').innerHTML = `Giacenza ${tabAttiva}: ${inGiacenza.length} | Ultimo Attivo: #${ultimoNum}`;
    document.getElementById('contenitori').innerHTML = inGiacenza.map(p => generateHtml(p)).join('');
    document.getElementById('ritiratiContainer').innerHTML = ritirati.map(p => generateHtml(p)).join('');
}

function generateHtml(p) {
    let infoRitiroHtml = (p.ritirato && p.dataRitiro) ? `<div class="info-ritiro">✓ Ritiro: ${p.ritiratoDa} - ${p.dataRitiro}</div>` : '';
    return `
        <div class="pacco ${p.ritirato ? 'ritirato' : ''}">
            <div style="flex-grow:1">
                <span class="tag-grandezza">${p.grandezza}</span>
                <strong>#${p.riconoscimento}</strong> - ${p.cognome.toUpperCase()} ${p.nome} <br>
                <small>${p.corriere} | ${p.scaffale || 'No scaffale'} | TRK: ${p.codiceTracciabilita}</small>
                ${infoRitiroHtml}
            </div>
            <input type="checkbox" ${p.ritirato ? 'checked' : ''} onchange="handleToggle(${p.id})" style="transform: scale(1.6); cursor:pointer; margin-left:15px;">
        </div>
    `;
}

function handleToggle(id) {
    const p = pacchi.find(x => x.id === id);
    if(!p.ritirato) {
        openModal("Conferma Ritiro", `Chi sta ritirando il pacco #${p.riconoscimento}?`, true, p.cognome, (nomeRitiro) => {
            const ora = new Date();
            p.ritirato = true;
            p.ritiratoDa = nomeRitiro.trim() || p.cognome;
            p.dataRitiro = ora.toLocaleDateString() + " " + ora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            salva();
            aggiornaVista();
        });
    } else {
        openModal("Ripristino", "Riportare il pacco in giacenza?", false, '', () => {
            p.ritirato = false;
            p.dataRitiro = null;
            p.ritiratoDa = '';
            salva();
            aggiornaVista();
        });
    }
}

function cancellaRitirati(){
    openModal("Svuota Cronologia", "Sei sicuro di voler eliminare tutti i pacchi ritirati?", false, '', () => {
        pacchi = pacchi.filter(p => !p.ritirato);
        salva();
        aggiornaVista();
    });
}

function setTab(t){ tabAttiva = t; aggiornaVista(); }

if(localStorage.getItem('loggedIn') === 'true') {
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
    aggiornaVista();
}
</script>
</body>
</html>
