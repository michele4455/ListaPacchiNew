<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>📦 Gestione Pacchi Postali Pro</title>
    <style>
        :root { 
            --primary: #003399; /* BLU POSTE */
            --primary-dark: #002266;
            --secondary: #f4f7f6; 
            --text: #2d3436; 
            --accent: #ffcc00; /* GIALLO POSTE */
            --success: #00b894;
            --white: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--secondary); padding: 0; margin: 0; color: var(--text); }

        /* --- LOGIN --- */
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, var(--primary) 0%, #333 100%); }
        .login-box { background: var(--white); padding: 40px; border-radius: 20px; text-align: center; width: 100%; max-width: 380px; border-top: 10px solid var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .app-header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; background: var(--primary); padding: 20px; border-radius: 15px; color: var(--accent); }
        .app-header img { height: 60px; }

        /* --- FORM --- */
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: var(--white); padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #ddd; }
        input, select, button { padding: 14px; font-size: 14px; border-radius: 10px; border: 1px solid #dfe6e9; outline: none; transition: 0.3s; }
        button { background-color: var(--primary); color: var(--accent); border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        button:hover { background-color: var(--primary-dark); transform: translateY(-2px); }

        /* --- TABS --- */
        .status-bar { background: var(--primary); color: var(--accent); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; }
        .tabs button { background-color: #e2e8f0; color: #4a5568; border-radius: 25px; padding: 10px 20px; border: none; cursor: pointer; }
        .tabs button.active { background-color: var(--accent); color: var(--primary); border: 2px solid var(--primary); font-weight: bold; }

        /* --- EFFETTO MOVIMENTO PACCO --- */
        .pacco { 
            background: var(--white); border-left: 8px solid var(--primary); padding: 18px; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 12px; 
            margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        .pacco:hover { 
            transform: translateX(10px) translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,51,153,0.15);
            background-color: #fffdf2;
        }
        .pacco.ritirato { border-left-color: var(--success); opacity: 0.7; }
        .tag-grandezza { background: var(--accent); color: var(--primary); padding: 4px 10px; border-radius: 6px; font-weight: 800; margin-right: 12px; }
        
        #customModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; border: 4px solid var(--primary); }
        #signature-pad { border: 2px dashed #ccc; background: #fff; border-radius: 8px; margin-top: 10px; touch-action: none; }
        .pacco-checkbox { transform: scale(1.8); cursor: pointer; accent-color: var(--primary); }
    </style>
</head>
<body>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle">Ritiro Pacco</h3>
        <p id="modalText"></p>
        <input type="text" id="modalInput" style="width:100%; box-sizing:border-box; margin-top:15px; display:none;" placeholder="Chi ritira?">
        <div id="firmaBox" style="display:none; margin-top:15px;">
            <canvas id="signature-pad" width="380" height="150"></canvas>
            <button onclick="clearCanvas()" style="font-size:10px; background:#666; color:white; margin-top:5px;">Cancella Firma</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:25px;">
            <button onclick="closeModal()" style="flex:1; background:#b2bec3; border:none; border-radius:10px;">Annulla</button>
            <button id="modalConfirmBtn" style="flex:1; border-radius:10px;">Conferma</button>
        </div>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://i.postimg.cc/G3y2rJB3/279906960-144981891431476-7263855552537817887-n-high.webp">
        <h2 style="color:var(--primary);">Area Riservata</h2>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; margin-bottom:12px; box-sizing: border-box;">
        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; margin-bottom:25px; box-sizing: border-box;">
        <button onclick="login()" style="width:100%">ENTRA</button>
    </div>
</div>

<div id="mainPage" style="display:none;" class="container">
    <div class="app-header">
        <img src="https://i.postimg.cc/G3y2rJB3/279906960-144981891431476-7263855552537817887-n-high.webp">
        <h1>Centro Post@ Anaclerio</h1>
    </div>

    <div class="form-group">
        <input type="text" id="codiceTracciabilita" placeholder="Tracking TRK">
        <input type="text" id="codiceRiconoscimento" placeholder="ID Pacco">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="cognome" placeholder="Cognome">

        <select id="corriereSelect"></select>
        <select id="scaffaleSelect">
            <option value="">Seleziona Scaffale</option>
            <script>for(let i=1;i<=12;i++) document.write(`<option value="Scaffale ${i}">Scaffale ${i}</option>`);</script>
        </select>
        <select id="grandezzaSelect">
            <option value="P">Taglia: P</option><option value="M">Taglia: M</option><option value="G">Taglia: G</option>
        </select>
        <button onclick="aggiungiPacco()">+ AGGIUNGI</button>
    </div>

    <div class="status-bar" id="counter"></div>
    <input type="text" id="search" style="width:100%; margin-bottom:25px; padding:15px; border-radius:50px; border:2px solid var(--primary); box-sizing:border-box;" placeholder="🔍 Cerca cliente o numero..." oninput="aggiornaVista()">
    
    <div class="tabs" id="tabs"></div>
    <div id="contenitori"></div>

    <div style="margin-top:50px;">
        <h3 onclick="toggleRitirati()" style="cursor:pointer; background:white; padding:15px; border-radius:10px; color:var(--primary)">▼ Archivio Ritirati</h3>
        <div id="sezRitirati" style="display:none;">
            <button id="btnSvuota" onclick="cancellaRitirati()" style="background:#d63031; color:white; font-size:11px; margin:15px 0;">SVUOTA RITIRATI (CORRIERE SELEZIONATO)</button>
            <div id="ritiratiContainer"></div>
        </div>
    </div>
</div>

<script>
// --- I TUOI 5 CORRIERI ORIGINALI ---
const corrieri = ["Punto Poste", "SDA", "BRT", "GLS", "Amazon"];
let pacchi = JSON.parse(localStorage.getItem('pacchi')) || [];
let tabAttiva = 'Tutti';

const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
let drawing = false;
function getPos(e){ const r = canvas.getBoundingClientRect(); return {x:(e.clientX||e.touches[0].clientX)-r.left, y:(e.clientY||e.touches[0].clientY)-r.top}; }
canvas.addEventListener('mousedown', (e)=>{ drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mousemove', (e)=>{ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
window.addEventListener('mouseup', ()=>drawing=false);
canvas.addEventListener('touchstart', (e)=>{ drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('touchmove', (e)=>{ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });

function salva(){ localStorage.setItem('pacchi', JSON.stringify(pacchi)); }

function login(){
    if(document.getElementById('loginEmail').value==='centroposte1@gmail.com' && document.getElementById('loginPassword').value==='2025754785478'){
        localStorage.setItem('loggedIn','true');
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainPage').style.display='block';
        aggiornaVista();
    } else alert("Dati errati");
}

function aggiungiPacco(){
    const n = document.getElementById('nome').value.trim();
    const c = document.getElementById('cognome').value.trim();
    const corr = document.getElementById('corriereSelect').value;
    const cr = document.getElementById('codiceRiconoscimento').value.trim();

    if(!c || !corr) return alert("Inserire Cognome e Corriere");

    let num = cr || (pacchi.filter(p=>p.corriere===corr && !p.ritirato).length + 1);
    if(!cr) {
        const pG = pacchi.filter(p=>p.corriere===corr && !p.ritirato);
        num = pG.length > 0 ? parseInt(pG[pG.length-1].riconoscimento)+1 : 1;
    }

    pacchi.push({
        id: Date.now(),
        codiceTracciabilita: document.getElementById('codiceTracciabilita').value || '-',
        riconoscimento: num,
        nome: n, cognome: c, corriere: corr,
        scaffale: document.getElementById('scaffaleSelect').value,
        grandezza: document.getElementById('grandezzaSelect').value,
        ritirato: false, dataRitiro: null, ritiratoDa: '', firma: null
    });
    salva(); aggiornaVista();
    ['codiceTracciabilita','codiceRiconoscimento','nome','cognome'].forEach(id=>document.getElementById(id).value='');
}

function aggiornaVista(){
    const sel = document.getElementById('corriereSelect');
    sel.innerHTML = '<option value="">Seleziona Corriere</option>' + corrieri.map(c=>`<option value="${c}">${c}</option>`).join('');
    
    const tBox = document.getElementById('tabs');
    tBox.innerHTML = `<button onclick="setTab('Tutti')" class="${tabAttiva==='Tutti'?'active':''}">Tutti</button>` + 
        corrieri.map(c=>`<button onclick="setTab('${c}')" class="${tabAttiva===c?'active':''}">${c}</button>`);

    const query = document.getElementById('search').value.toLowerCase();
    const filt = p => (tabAttiva==='Tutti' || p.corriere===tabAttiva) && (p.cognome.toLowerCase().includes(query) || String(p.riconoscimento).includes(query));
    
    const giacenza = pacchi.filter(p => !p.ritirato && filt(p));
    const ritirati = pacchi.filter(p => p.ritirato && filt(p)).reverse();

    document.getElementById('counter').innerHTML = `📦 Giacenza ${tabAttiva}: ${giacenza.length}`;
    document.getElementById('btnSvuota').innerText = `SVUOTA RITIRATI (${tabAttiva})`;
    document.getElementById('contenitori').innerHTML = giacenza.map(p=>genHtml(p)).join('');
    document.getElementById('ritiratiContainer').innerHTML = ritirati.map(p=>genHtml(p)).join('');
}

function genHtml(p) {
    return `
        <div class="pacco ${p.ritirato?'ritirato':''}">
            <div style="flex:1">
                <span class="tag-grandezza">${p.grandezza}</span>
                <strong>#${p.riconoscimento}</strong> - ${p.cognome.toUpperCase()} ${p.nome}<br>
                <small>${p.corriere} • ${p.scaffale} • TRK: ${p.codiceTracciabilita}</small>
                ${p.ritirato ? `<div style="color:green;font-size:0.8em;margin-top:5px">✓ Ritirato da ${p.ritiratoDa} il ${p.dataRitiro}</div>` : ''}
            </div>
            <input type="checkbox" class="pacco-checkbox" ${p.ritirato?'checked':''} onchange="handleT(${p.id})">
        </div>
    `;
}

function handleT(id){
    const p = pacchi.find(x=>x.id===id);
    if(!p.ritirato){
        document.getElementById('customModal').style.display='flex';
        document.getElementById('modalText').innerText = `Pacco #${p.riconoscimento} di ${p.cognome}`;
        document.getElementById('modalInput').style.display='block';
        document.getElementById('modalInput').value = p.cognome;
        document.getElementById('firmaBox').style.display='block';
        ctx.clearRect(0,0,canvas.width,canvas.height);
        document.getElementById('modalConfirmBtn').onclick = () => {
            p.ritirato = true;
            p.ritiratoDa = document.getElementById('modalInput').value;
            p.dataRitiro = new Date().toLocaleString();
            p.firma = canvas.toDataURL();
            salva(); closeModal();
        };
    } else {
        if(confirm("Ripristinare pacco?")){ p.ritirato=false; salva(); aggiornaVista(); }
    }
}

function closeModal(){ document.getElementById('customModal').style.display='none'; aggiornaVista(); }
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); }
function toggleRitirati(){ const s=document.getElementById('sezRitirati'); s.style.display=s.style.display==='none'?'block':'none'; }
function setTab(t){ tabAttiva=t; aggiornaVista(); }

function cancellaRitirati(){
    const msg = tabAttiva === 'Tutti' ? "Svuotare TUTTO l'archivio ritirati?" : `Svuotare solo i ritirati di ${tabAttiva}?`;
    if(confirm(msg)){
        if(tabAttiva === 'Tutti') pacchi = pacchi.filter(p=>!p.ritirato);
        else pacchi = pacchi.filter(p=>!(p.ritirato && p.corriere === tabAttiva));
        salva(); aggiornaVista();
    }
}

if(localStorage.getItem('loggedIn')==='true'){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
    aggiornaVista();
}
</script>
</body>
</html>
